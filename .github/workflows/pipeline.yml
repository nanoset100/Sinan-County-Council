name: data-pipeline

# 반자동 수집 파이프라인 (PRD v0.4 §6). 주 2회 cron.
# 수집 → 정규화 → AI 초안 → Verifier → 변경 감지 → 자동 PR(검수 큐).
# PR 리뷰가 사람 검수 게이트(원칙 6)를 겸한다. 인증키가 없으면 manual 폴백으로 no-op.
on:
  schedule:
    - cron: '0 18 * * 1,4' # 매주 월·목 (UTC) — 주 2회 증분 수집(§9)
  workflow_dispatch:
    inputs:
      collector:
        description: '수집기 (s1 | manual)'
        default: 'manual'

permissions:
  contents: write
  pull-requests: write

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      COLLECTOR: ${{ github.event.inputs.collector || 'manual' }}
      S1_API_KEY: ${{ secrets.S1_API_KEY }}
      S1_RASMBLY_ID: ${{ secrets.S1_RASMBLY_ID }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: 파이프라인 실행 (스테이징 생성)
        run: npm run pipeline
      - name: 스테이징 검증
        run: npm run validate
      # NOTE(배치 2): 검수 대상 반영은 사람 검토를 전제로 한다.
      # peter-evans/create-pull-request 로 .pipeline-out → data/ 반영 PR 을 열고,
      # PR 리뷰에서 운영자가 원문 대조 후 승인(reviewed_by/at 기록)한다.
      # 여기서는 골격만 두고 자동 머지는 하지 않는다(무검수 게시 금지, 원칙 6).
